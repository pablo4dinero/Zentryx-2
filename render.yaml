services:
  - type: web
    name: zentryx-2-api
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: static
    name: zentryx-app
    rootDir: artifacts/rd-intelligence
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false