services:
  - type: web
    name: zentryx-api
    runtime: node
    region: frankfurt
    rootDir: artifacts/api-server
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD_HASH
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: TERMII_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_EMAIL_DOMAINS
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false

  - type: static
    name: zentryx-app
    rootDir: artifacts/rd-intelligence
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
