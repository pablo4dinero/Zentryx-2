services:
  - type: web
    name: zentryx-app
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build && pnpm --filter @workspace/rd-intelligence run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false