name: Weekly Database Backup

on:
  schedule:
    # Every Sunday at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          # Add PostgreSQL official repository
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          # Install PostgreSQL 18 client tools to match server version
          sudo apt-get install -y postgresql-client-18

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Parse DATABASE_URL: postgresql://user:password@host:port/database
          # Remove the postgresql:// prefix
          URL=${DATABASE_URL#postgresql://}

          # Extract user:password
          USERPASS=${URL%%@*}
          PGUSER=${USERPASS%%:*}
          PGPASSWORD=${USERPASS#*:}

          # Extract host:port/database
          HOSTPART=${URL#*@}
          PGHOST=${HOSTPART%%/*}
          PGHOST=${PGHOST%:*}

          # Extract port
          if [[ $HOSTPART =~ :([0-9]+) ]]; then
            PGPORT=${BASH_REMATCH[1]}
          else
            PGPORT=5432
          fi

          # Extract database name
          PGDATABASE=${HOSTPART#*/}

          echo "Backing up database: $PGDATABASE on $PGHOST:$PGPORT"

          # Create the backup
          export PGPASSWORD=$PGPASSWORD
          BACKUP_DATE=$(date +%Y-%m-%d)
          BACKUP_FILE="zentryx-backup-${BACKUP_DATE}.sql"

          pg_dump -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -v > $BACKUP_FILE

          # Verify backup was created and has content
          if [ ! -f "$BACKUP_FILE" ] || [ ! -s "$BACKUP_FILE" ]; then
            echo "ERROR: Backup file is empty or missing"
            exit 1
          fi

          BACKUP_SIZE=$(du -h $BACKUP_FILE | cut -f1)
          echo "Backup created successfully: $BACKUP_FILE ($BACKUP_SIZE)"

          # Compress
          gzip $BACKUP_FILE
          COMPRESSED_FILE="${BACKUP_FILE}.gz"

          # Store filename for next step
          echo "BACKUP_FILE=$COMPRESSED_FILE" >> $GITHUB_ENV
          echo "BACKUP_SIZE=$(du -h $COMPRESSED_FILE | cut -f1)" >> $GITHUB_ENV

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          # Install AWS CLI
          pip install awscli

          # Create bucket if it doesn't exist
          aws s3api head-bucket --bucket zentryx-backup 2>/dev/null || \
            aws s3api create-bucket --bucket zentryx-backup --region us-east-1

          # Enable versioning on bucket
          aws s3api put-bucket-versioning \
            --bucket zentryx-backup \
            --versioning-configuration Status=Enabled

          # Enable server-side encryption
          aws s3api put-bucket-encryption \
            --bucket zentryx-backup \
            --server-side-encryption-configuration '{
              "Rules": [{
                "ApplyServerSideEncryptionByDefault": {
                  "SSEAlgorithm": "AES256"
                }
              }]
            }' 2>/dev/null || true

          # Upload backup
          aws s3 cp ${{ env.BACKUP_FILE }} s3://zentryx-backup/ \
            --storage-class STANDARD_IA \
            --metadata "date=$(date -u +%Y-%m-%dT%H:%M:%SZ),size=${{ env.BACKUP_SIZE }}"

          echo "âś… Backup uploaded: s3://zentryx-backup/${{ env.BACKUP_FILE }}"

          # Export backup timestamp for Render env var update
          echo "BACKUP_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Set S3 lifecycle policy (30-day retention)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          pip install awscli
          aws s3api put-bucket-lifecycle-configuration \
            --bucket zentryx-backup \
            --lifecycle-configuration '{
              "Rules": [{
                "Id": "DeleteOldBackups",
                "Status": "Enabled",
                "Expiration": {
                  "Days": 30
                },
                "NoncurrentVersionExpiration": {
                  "NoncurrentDays": 30
                }
              }]
            }' 2>/dev/null || true

      - name: Clean up local backup
        if: always()
        run: rm -f zentryx-backup-*.sql.gz

      - name: Create backup success summary
        if: success()
        run: |
          echo "## âś… Database Backup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u +%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**File:** ${{ env.BACKUP_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ env.BACKUP_SIZE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Location:** s3://zentryx-backup/${{ env.BACKUP_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To check backup health: \`curl https://your-api.render.com/api/health/backups\`" >> $GITHUB_STEP_SUMMARY

